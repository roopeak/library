<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Library</title>
</head>
<body>
    <h1>Library</h1>
    <div class="add-book-button-container">
        <button class="add-book">Add book</button>
    </div>
    <div class="book-display"></div>
    <div class="form-container">
        <form class="add-book-form">
            <label for="title">Title of the book:</label>
            <input type="text" id="title">

            <label for="author">Author of the book:</label>
            <input type="text" id="author">

            <label for="pages">Number of pages:</label>
            <input type="number" id="pages">

            <label for="read">Have you read it?</label>

            <div class="radio-buttons">
                <input type="radio" id="read" name="read" value="Read">
                <label for="yes">Yes</label>
                <input type="radio" id="read" name="read" value="Not read">
                <label for="no">No</label>
            </div>

            <button class="submit-button">Add a book</button>
        </form>
    </div>
    <script src="script.js"></script>

</body>
</html>
